[extend]
useDefault = true

[allowlist]
description = "Test fixtures, mock code patterns, and generic docs"
paths = [
    '''tests/.*\.py''',
    '''Makefile''',
    '''README\.md''',
    '''\.env\.example'''
]
regexes = [
    '''SHARE_PASSWORD\s*=\s*"(changeme|test-?pass|hunter2|password123|secret)"''',
    '''echo "changeme"''',
    '''openssl rand -base64'''
]
